name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install styler
        run: install.packages("styler")
        shell: Rscript {0}

      - name: Style R code
        run: styler::style_pkg()
        shell: Rscript {0}

      - name: Style C++ code
        run: clang-format --style=Google -i $(find src -name '*.cpp' -o -name '*.h' ! -name 'RcppExports.cpp')

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format R and C++ code"
